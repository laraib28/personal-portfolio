openapi: 3.1.0
info:
  title: Portfolio MCP Server API
  description: |
    Model Context Protocol (MCP) server for the AI Powered Professional Portfolio.
    Provides read-only resources and action tools for the agentic chatbot.
  version: 1.0.0
  contact:
    name: Portfolio Owner

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://portfolio-mcp.onrender.com
    description: Production (Render)

tags:
  - name: Resources
    description: Read-only portfolio data endpoints
  - name: Tools
    description: Action endpoints for agent use
  - name: Health
    description: System health endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/profile:
    get:
      tags: [Resources]
      summary: Get developer profile
      operationId: getProfile
      description: Returns the developer's professional profile and contact metadata.
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

  /api/v1/skills:
    get:
      tags: [Resources]
      summary: Get skills list
      operationId: getSkills
      description: Returns all skills with categories and proficiency levels.
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [Frontend, Backend, AI, DevOps, Tools, Methodology]
          description: Filter by category
      responses:
        '200':
          description: Skills list
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'

  /api/v1/projects:
    get:
      tags: [Resources]
      summary: Get projects list
      operationId: getProjects
      description: Returns all projects with summaries.
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
          description: Filter by featured status
        - name: is_ai_work
          in: query
          schema:
            type: boolean
          description: Filter by AI work status
      responses:
        '200':
          description: Projects list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectSummary'

  /api/v1/projects/{project_id}:
    get:
      tags: [Resources]
      summary: Get project details
      operationId: getProjectDetails
      description: Returns full project case study by ID.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID (slug)
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tools/chat:
    post:
      tags: [Tools]
      summary: Chat with AI agent
      operationId: chat
      description: |
        Send a message to the AI agent. The agent uses MCP tools to fetch
        portfolio data and responds with streaming text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: User message
                  maxLength: 2000
                conversation_id:
                  type: string
                  description: Optional conversation ID for context
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-sent events with chat response chunks
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tools/send-email:
    post:
      tags: [Tools]
      summary: Send lead email
      operationId: sendEmail
      description: |
        Send an email notification to the portfolio owner with lead details.
        Requires explicit user consent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSubmissionRequest'
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tools/send-whatsapp:
    post:
      tags: [Tools]
      summary: Send WhatsApp notification
      operationId: sendWhatsapp
      description: |
        Send a WhatsApp notification to the portfolio owner with lead details.
        Requires explicit user consent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSubmissionRequest'
      responses:
        '200':
          description: WhatsApp sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Profile:
      type: object
      required: [name, title, summary, expertise, availability, location, contact]
      properties:
        name:
          type: string
          maxLength: 100
        title:
          type: string
          maxLength: 150
        summary:
          type: string
          minLength: 50
          maxLength: 500
        expertise:
          type: array
          items:
            type: string
            maxLength: 50
          minItems: 3
          maxItems: 10
        availability:
          type: string
          enum: [Available, Limited Availability, Not Available]
        location:
          type: string
        contact:
          $ref: '#/components/schemas/ContactMetadata'

    ContactMetadata:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        linkedin:
          type: string
          format: uri
          nullable: true
        github:
          type: string
          format: uri
          nullable: true
        twitter:
          type: string
          format: uri
          nullable: true

    Skill:
      type: object
      required: [id, name, category, proficiency, years]
      properties:
        id:
          type: string
          pattern: ^[a-z0-9-]+$
          maxLength: 50
        name:
          type: string
          maxLength: 100
        category:
          type: string
          enum: [Frontend, Backend, AI, DevOps, Tools, Methodology]
        proficiency:
          type: string
          enum: [Expert, Advanced, Intermediate]
        years:
          type: integer
          minimum: 0
          maximum: 30
        icon:
          type: string
          nullable: true

    ProjectSummary:
      type: object
      required: [id, title, tech_stack, is_ai_work, featured]
      properties:
        id:
          type: string
        title:
          type: string
        tech_stack:
          type: array
          items:
            type: string
        is_ai_work:
          type: boolean
        featured:
          type: boolean

    Project:
      type: object
      required: [id, title, problem, solution, tech_stack, outcome, is_ai_work, featured]
      properties:
        id:
          type: string
        title:
          type: string
          maxLength: 150
        problem:
          type: string
          minLength: 50
          maxLength: 500
        solution:
          type: string
          minLength: 100
          maxLength: 1000
        tech_stack:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 15
        outcome:
          type: string
          minLength: 50
          maxLength: 500
        images:
          type: array
          items:
            type: string
            format: uri
          maxItems: 5
        is_ai_work:
          type: boolean
        featured:
          type: boolean
        url:
          type: string
          format: uri
          nullable: true
        github:
          type: string
          format: uri
          nullable: true

    ContactSubmissionRequest:
      type: object
      required: [name, email, message, consent]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        message:
          type: string
          minLength: 10
          maxLength: 2000
        consent:
          type: boolean
          description: User must explicitly consent to contact

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
